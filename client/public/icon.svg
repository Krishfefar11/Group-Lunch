<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="#0f0f11"/>
  <!-- Orange glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" opacity="0.15"/>
  <!-- Bento box icon -->
  <text x="256" y="320" font-size="240" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">🍱</text>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a500"/>
