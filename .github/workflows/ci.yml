name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Server unit tests ────────────────────────────────────────────────────
  test:
    name: Server tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run unit tests
        run: npx jest --no-coverage --forceExit
        working-directory: server

  # ── 2. Client production build ──────────────────────────────────────────────
  build:
    name: Client build
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build (production)
        run: npx webpack --config webpack.config.js --mode production
        working-directory: client
        env:
          REACT_APP_SERVER_URL:          ${{ secrets.REACT_APP_SERVER_URL }}
          REACT_APP_EMAILJS_SERVICE_ID:  ${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}
          REACT_APP_EMAILJS_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_TEMPLATE_ID }}
          REACT_APP_EMAILJS_PUBLIC_KEY:  ${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.sha }}
          path: client/dist/
          retention-days: 7

  # ── 3. Server smoke test ────────────────────────────────────────────────────
  smoke:
    name: Server smoke test
    runs-on: ubuntu-latest
    needs: test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: grouplunch_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Start server and hit health endpoint
        run: |
          node server.js &
          sleep 5
          curl -f http://localhost:8000/api/health
        working-directory: server
        env:
          NODE_ENV: production
          PORT: 8000
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: grouplunch_test
          CLIENT_URL: http://localhost:3000
